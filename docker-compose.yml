# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
# 
# 使用方式:
#   定时模式: docker-compose up -d analyzer

version: '3.8'

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile.backend
  restart: unless-stopped

  # 环境变量（从 .env 文件加载）
  env_file:
    - .env

  volumes:
    - ./backend/data:/app/backend/data
    - ./backend/logs:/app/backend/logs
    - ./backend/reports:/app/backend/reports
    - ./.env:/app/backend/.env

  environment:
    - TZ=Asia/Shanghai

    # 代理设置（如果需要）
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # 资源限制
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # 定时任务模式
  analyzer:
    <<: *common
    container_name: stock-analyzer
