groups:
  - name: refactor-threshold-governance-alerts
    rules:
      - alert: RefactorThresholdGovernanceWarn
        expr: refactor_backtest_records_return_sample_multi_window_alert_threshold_governance_level{level="warn"} == 1
        for: 15m
        labels:
          severity: warning
          scope: backtest
          domain: threshold-governance
        annotations:
          summary: "Threshold governance level is warn"
          description: "Raw-normalized threshold mismatch governance level has stayed at warn for 15m."

      - alert: RefactorThresholdGovernanceCritical
        expr: refactor_backtest_records_return_sample_multi_window_alert_threshold_governance_level{level="critical"} == 1
        for: 5m
        labels:
          severity: critical
          scope: backtest
          domain: threshold-governance
        annotations:
          summary: "Threshold governance level is critical"
          description: "Raw-normalized threshold mismatch governance level has stayed at critical for 5m."

      - alert: RefactorThresholdGovernanceNormalizationApplied
        expr: refactor_backtest_records_return_sample_multi_window_alert_threshold_governance_ratio_normalization_applied > 0
        for: 30m
        labels:
          severity: warning
          scope: backtest
          domain: threshold-governance
        annotations:
          summary: "Threshold governance ratio normalization applied"
          description: "Governance warn/critical ratio configuration has been normalized for at least 30m."

      - alert: RefactorPromtoolSoftAuditMaxLinesExceeded
        expr: refactor_promtool_remote_soft_fallback_audit_config_max_lines > 0 and refactor_promtool_remote_soft_fallback_audit_file_line_count > refactor_promtool_remote_soft_fallback_audit_config_max_lines
        for: 10m
        labels:
          severity: warning
          scope: promtool
          domain: soft-audit
        annotations:
          summary: "Soft audit lines exceeded configured max"
          description: "Soft audit file line count exceeded configured max lines for 10m."

      - alert: RefactorPromtoolSoftAuditMaxBytesExceeded
        expr: refactor_promtool_remote_soft_fallback_audit_config_max_bytes > 0 and refactor_promtool_remote_soft_fallback_audit_file_size_bytes > refactor_promtool_remote_soft_fallback_audit_config_max_bytes
        for: 10m
        labels:
          severity: warning
          scope: promtool
          domain: soft-audit
        annotations:
          summary: "Soft audit bytes exceeded configured max"
          description: "Soft audit file size exceeded configured max bytes for 10m."

      - alert: RefactorPromtoolSoftAuditRotationUnbounded
        expr: refactor_promtool_remote_soft_fallback_audit_enabled == 1 and refactor_promtool_remote_soft_fallback_audit_config_max_lines == 0 and refactor_promtool_remote_soft_fallback_audit_config_max_bytes == 0 and refactor_promtool_remote_soft_fallback_audit_config_retention_days == 0
        for: 45m
        labels:
          severity: warning
          scope: promtool
          domain: soft-audit
        annotations:
          summary: "Soft audit rotation guards are fully disabled"
          description: "All soft audit rotation guards are disabled (lines/bytes/retention) for 45m."
