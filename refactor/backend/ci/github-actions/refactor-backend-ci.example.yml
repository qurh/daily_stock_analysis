name: Refactor Backend CI Example

on:
  pull_request:
    branches: [main]
    paths:
      - "refactor/backend/**"
      - "refactor/docs/**"
      - ".github/workflows/refactor-backend-ci.yml"

jobs:
  refactor-backend-ci:
    name: Refactor Backend Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "refactor/backend/requirements-dev.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r refactor/backend/requirements-dev.txt

      - name: Install promtool
        env:
          PROMTOOL_VERSION: "2.52.0"
        run: |
          ARCHIVE="prometheus-${PROMTOOL_VERSION}.linux-amd64.tar.gz"
          URL="https://github.com/prometheus/prometheus/releases/download/v${PROMTOOL_VERSION}/${ARCHIVE}"
          curl -fsSL -o "/tmp/${ARCHIVE}" "${URL}"
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp
          sudo install "/tmp/prometheus-${PROMTOOL_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version

      - name: Run refactor backend ci.sh
        env:
          CI: "true"
          PROMTOOL_REQUIRED: "1"
        run: |
          cd refactor/backend
          bash scripts/ci.sh
